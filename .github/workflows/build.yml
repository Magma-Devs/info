name: Build

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'

  build-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Check if image exists
        id: check
        run: |
          if aws ecr describe-images --repository-name info-api --image-ids imageTag=${{ github.sha }} 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'false'

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.exists == 'false'
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/info-api:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/info-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [mainnet, testnet]
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Check if image exists
        id: check
        run: |
          if aws ecr describe-images --repository-name info-web --image-ids imageTag=${{ matrix.environment }}-${{ github.sha }} 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'false'

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.exists == 'false'
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_NETWORK=${{ matrix.environment }}
          tags: |
            ${{ steps.ecr.outputs.registry }}/info-web:${{ matrix.environment }}-${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/info-web:${{ matrix.environment }}-latest
          cache-from: type=gha,scope=web-${{ matrix.environment }}
          cache-to: type=gha,scope=web-${{ matrix.environment }},mode=max
