name: Publish

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build and push"
        required: true
        type: choice
        options:
          - both
          - api
          - web

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  publish-api:
    if: inputs.service == 'api' || inputs.service == 'both'
    runs-on: ubuntu-latest
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Check if image exists
        id: check
        run: |
          if aws ecr describe-images --repository-name info-api --image-ids imageTag=${{ github.sha }} 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'false'

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.exists == 'false'
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/info-api:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/info-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  publish-web:
    if: inputs.service == 'web' || inputs.service == 'both'
    runs-on: ubuntu-latest
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Check if image exists
        id: check
        run: |
          if aws ecr describe-images --repository-name info-web --image-ids imageTag=${{ github.sha }} 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'false'

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.exists == 'false'
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ steps.ecr.outputs.registry }}/info-web:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/info-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
