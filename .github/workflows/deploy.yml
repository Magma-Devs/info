name: Deploy

on:
  push:
    branches: [mainnet]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      indexer: ${{ steps.filter.outputs.indexer }}
      web: ${{ steps.filter.outputs.web }}
      health-probe: ${{ steps.filter.outputs.health-probe }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/db/**'
              - 'packages/shared/**'
            indexer:
              - 'apps/indexer/**'
              - 'packages/db/**'
              - 'packages/shared/**'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
            health-probe:
              - 'apps/health-probe/**'
              - 'packages/shared/**'

  deploy-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push API image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile -t $REGISTRY/info-api:$IMAGE_TAG -t $REGISTRY/info-api:latest .
          docker push $REGISTRY/info-api:$IMAGE_TAG
          docker push $REGISTRY/info-api:latest

      - name: Update ECS service
        run: |
          aws ecs update-service --cluster info --service info-api --force-new-deployment

  deploy-indexer:
    needs: changes
    if: needs.changes.outputs.indexer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push Indexer image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/indexer/Dockerfile -t $REGISTRY/info-indexer:$IMAGE_TAG -t $REGISTRY/info-indexer:latest .
          docker push $REGISTRY/info-indexer:$IMAGE_TAG
          docker push $REGISTRY/info-indexer:latest

      - name: Update ECS service
        run: |
          aws ecs update-service --cluster info --service info-indexer --force-new-deployment

  deploy-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push Web image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/web/Dockerfile -t $REGISTRY/info-web:$IMAGE_TAG -t $REGISTRY/info-web:latest .
          docker push $REGISTRY/info-web:$IMAGE_TAG
          docker push $REGISTRY/info-web:latest

      - name: Update ECS service
        run: |
          aws ecs update-service --cluster info --service info-web --force-new-deployment

  deploy-health-probe:
    needs: changes
    if: needs.changes.outputs.health-probe == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push Health Probe image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/health-probe/Dockerfile -t $REGISTRY/info-health-probe:$IMAGE_TAG -t $REGISTRY/info-health-probe:latest .
          docker push $REGISTRY/info-health-probe:$IMAGE_TAG
          docker push $REGISTRY/info-health-probe:latest

      - name: Update ECS service
        run: |
          aws ecs update-service --cluster info --service info-health-probe --force-new-deployment
