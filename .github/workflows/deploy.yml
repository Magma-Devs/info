name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - mainnet
          - testnet
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - both
          - api
          - web
      tag:
        description: "Image tag (commit SHA or latest)"
        required: false
        default: "latest"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy-api:
    if: inputs.service == 'api' || inputs.service == 'both'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Deploy API to ${{ inputs.environment }}
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          CLUSTER: info-${{ inputs.environment }}
          TAG: ${{ inputs.tag }}
        run: |
          IMAGE="${REGISTRY}/info-api:${TAG}"

          echo "Deploying ${IMAGE} to ${CLUSTER}/api"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${CLUSTER}-api \
            --query 'taskDefinition' \
            --output json)

          UPDATED=$(echo "$TASK_DEF" | jq \
            --arg IMG "$IMAGE" \
            '.containerDefinitions[0].image = $IMG |
             {family, taskRoleArn, executionRoleArn, networkMode,
              containerDefinitions, requiresCompatibilities, cpu, memory}')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$UPDATED" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service api \
            --task-definition "$NEW_ARN"

          echo "Deployed ${IMAGE} → ${CLUSTER}/api (task def: ${NEW_ARN})"

  deploy-web:
    if: inputs.service == 'web' || inputs.service == 'both'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Deploy Web to ${{ inputs.environment }}
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          CLUSTER: info-${{ inputs.environment }}
          TAG: ${{ inputs.tag }}
        run: |
          IMAGE="${REGISTRY}/info-web:${TAG}"

          echo "Deploying ${IMAGE} to ${CLUSTER}/web"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${CLUSTER}-web \
            --query 'taskDefinition' \
            --output json)

          UPDATED=$(echo "$TASK_DEF" | jq \
            --arg IMG "$IMAGE" \
            '.containerDefinitions[0].image = $IMG |
             {family, taskRoleArn, executionRoleArn, networkMode,
              containerDefinitions, requiresCompatibilities, cpu, memory}')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$UPDATED" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service web \
            --task-definition "$NEW_ARN"

          echo "Deployed ${IMAGE} → ${CLUSTER}/web (task def: ${NEW_ARN})"
